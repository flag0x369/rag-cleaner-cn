short_noise_max_chars: 80
strong_marketing_max_chars: 140

marketing_patterns:
  - "扫码.*领取"
  - "添加.*微信"
  - "回复.*领取"
  - "点击.*阅读原文"
  - "点击下方.*关注公众号"
  - "关注.*成长不迷路"
  - "点击.*领取.*读物"
  - "\\d+\\+.*销售.*(沉淀人脉|联合拓客|寻找产品)"
  - "欢迎点击下方卡片.*持续订阅"
  - "欢迎添加我.*微信领取书单"
  - "微信领取书单"
  - "欢迎加入我的朋友圈"
  - "长期分享.*欢迎加入我的朋友圈"
  - "^#{0,6}\\s*购买链接[:：]?$"
  - "^#{0,6}\\s*赚钱思维\\s*\\|.*认知提升\\s*$"
  - "点个关注.*下一篇更精彩"
  - "关于作者.*欢迎关注.*公众号"
  - "^点击下方.*关注我.*$"
  - "^关注我[👇，,。！!\\s].*$"
  - "^这是我的个人微信.*欢迎.*$"
  - "^放在这就是欢迎你来添加.*$"
  - "^长期分享感悟、书单、思维等等$"
  - "^新一期.*训练营.*发车.*$"
  - "限时.*优惠"
  - "马上.*报名"
  - "点赞.*在看"
  - "转发给朋友"

strong_marketing_patterns:
  - "朋友圈置顶.*欢迎添加我.*微信领取书单"
  - "我读了几百本书.*微信领取书单"

footer_patterns:
  - "版权所有"
  - "转载请注明"
  - "免责声明"
  - "阅读原文"
  - "此内容因违规无法查看"
  - "微信公众平台运营中心"
  - "^全\\s*文\\s*完$"
  - "^-\\s*END\\s*-$"
  - "^原创文章，不得转载$"

trailing_footer_start_patterns:
  - "^\\d+[、.]\\s*链接广智$"
  - "^链接广智$"
  - "^##?\\s*PART\\d+、其他$"
  - "^##?\\s*PART\\d+、链接$"
  - "^销售训练营课程还在开放预约"
  - "^（?正文完）?$"
  - "^\\(?正文完\\)?$"
  - "^原创文章，不得转载$"
  - "^⭐?关于作者经历点击.*查看[:：]?$"
  - "^我是差劲先生.*公众号.*欢迎.*我[。！!]*$"

inline_trailing_footer_start_patterns:
  - "(?<=。)\\s*\\d+[、.]\\s*链接广智\\b"

trailing_footer_evidence_patterns:
  - "购买链接"
  - "点击图片了解"
  - "训练营介绍"
  - "更多干货"
  - "销售人脉小程序"
  - "礼品.*供应链"
  - "关于作者经历点击"
  - "公众号复利合作"
  - "联系微信"
  - "长期分享感悟、书单"
  - "个人微信.*欢迎"
  - "欢迎你来添加"
  - "知识星球"
  - "私我.*拉你"
  - "公众号值得一读"
  - "销售训练营课程.*开放预约"
  - "欢迎链接"
  - "买课"
  - "试听课"

wechat_noise_patterns:
  - "点赞"
  - "在看"
  - "分享给朋友"
  - "关注公众号"

transcript_artifact_patterns:
  - "^\\d+$"
  - "^\\d{2}:\\d{2}:\\d{2}"
  - "^WEBVTT$"

classroom_noise_patterns:
  - "^大家打字$"
  - "^开麦$"
  - "^能听到吗$"
  - "^给我扣个一$"
  - "^扣个一$"
  - "^清楚扣个一$"
  - "扣个一"
  - "^我拿瓶水$"
  - "^今天卡顿$"
  - "^下次再见$"
  - "^清楚吗$"

image_placeholder_patterns:
  - "^!\\[.*\\]\\(.*\\)$"
  - "^\\[图片\\]$"
  - "^图片$"

filler_words:
  - "嗯"
  - "啊"
  - "呃"
  - "额"
  - "这个呢"
  - "那个呢"
  - "就是说"
  - "怎么说呢"
  - "对吧"
  - "对吧啊"
  - "对不对"
  - "对不对啊"
  - "是不是"
  - "什么东西"
  - "好吧"
  - "好不好"
  - "清楚吗"
  - "扣个一"
  - "然后呢"

asr_homophone_candidates:
  私城: 私域
  增张: 增长
  乔哈里创: 乔哈里窗
  囚禁已知: 穷尽已知
  SPN: SPIN
  BNT: BANT
  痛苦恋: 痛苦链
  线刃: 线人
  销 售: 销售
  1 00%: 100%
